name: Build Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. v1.2.0). Defaults to git-derived string."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-installer:
    name: Installer (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
          - name: Linux
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Compute version string
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "APP_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=$(git log -1 --format=%cd-%h --date=format:%Y%m%d --abbrev=6)" >> "$GITHUB_ENV"
          fi

      # ── Windows: NSIS installer ───────────────────────────────────────────
      - name: Build Windows NSIS installer
        if: runner.os == 'Windows'
        shell: bash
        run: wails build -nsis -ldflags "-X main.AppVersion=$APP_VERSION"

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: atropos-windows-installer
          # Wails names the NSIS output: <outputfilename>-<arch>-installer.exe
          path: build/bin/atropos-amd64-installer.exe
          retention-days: 30

      # ── macOS: DMG ────────────────────────────────────────────────────────
      - name: Build macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: wails build -ldflags "-X main.AppVersion=$APP_VERSION"

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        run: |
          hdiutil create \
            -volname "Atropos" \
            -srcfolder build/bin/atropos.app \
            -ov \
            -format UDZO \
            atropos-macos.dmg

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: atropos-macos-installer
          path: atropos-macos.dmg
          retention-days: 30

      # ── Linux: .deb package ───────────────────────────────────────────────
      - name: Build Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: wails build -tags webkit2_41 -ldflags "-X main.AppVersion=$APP_VERSION"

      - name: Create Linux .deb package
        if: runner.os == 'Linux'
        run: |
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/local/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/256x256/apps

          cp build/bin/atropos deb/usr/local/bin/atropos
          chmod 755 deb/usr/local/bin/atropos

          if [ -f build/appicon.png ]; then
            cp build/appicon.png deb/usr/share/icons/hicolor/256x256/apps/atropos.png
          fi

          cat > deb/usr/share/applications/atropos.desktop << 'DESKTOP'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Atropos
          Comment=Image perspective correction and circular cropping tool
          Exec=/usr/local/bin/atropos
          Icon=atropos
          Categories=Graphics;ImageProcessing;
          MimeType=image/png;image/jpeg;image/tiff;image/bmp;
          DESKTOP

          cat > deb/DEBIAN/control << CONTROL
          Package: atropos
          Version: ${APP_VERSION}
          Architecture: amd64
          Maintainer: Atropos Team
          Description: Image perspective correction and circular cropping tool
           Atropos is a desktop application for digitizing musical materials
           (CDs, vinyl, cassettes) using perspective correction and circular cropping.
          CONTROL

          dpkg-deb --build deb atropos-linux-amd64.deb

      - name: Upload Linux .deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: atropos-linux-installer
          path: atropos-linux-amd64.deb
          retention-days: 30

  # ── Optional: attach installers to a GitHub release ──────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-installer
    if: github.event.inputs.version != ''
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Atropos ${{ github.event.inputs.version }}
          files: installers/*
          generate_release_notes: true
