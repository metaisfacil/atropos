name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Windows
            os: windows-latest
            build-flags: -o atropos.exe
            binary: build/bin/atropos.exe
            asset-name: atropos-windows-amd64.exe
          - name: macOS
            os: macos-latest
            build-flags: ""
            binary: build/bin/atropos.app
            asset-name: atropos-macos-universal.zip
          - name: Linux
            os: ubuntu-latest
            build-flags: -tags webkit2_41
            binary: build/bin/atropos
            asset-name: atropos-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Compute version string
        shell: bash
        run: echo "APP_VERSION=$(git log -1 --format=%cd-%h --date=format:%Y%m%d --abbrev=6)" >> "$GITHUB_ENV"

      - name: Build application
        shell: bash
        run: wails build ${{ matrix.build-flags }} -ldflags "-X main.AppVersion=$APP_VERSION"

      - name: Package binary for release
        shell: bash
        run: |
          if [[ "${{ matrix.binary }}" == *.app ]]; then
            cd build/bin && zip -r "$GITHUB_WORKSPACE/${{ matrix.asset-name }}" atropos.app
          else
            cp "${{ matrix.binary }}" "${{ matrix.asset-name }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: ${{ matrix.asset-name }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
