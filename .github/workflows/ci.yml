name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep

      - name: Run Go tests
        run: go test ./... -count=1 -v

      - name: Set up Node.js for frontend tests
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Vite/Vitest tests
        run: npm run test:all
        working-directory: frontend

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact: atropos-windows
            build-flags: -o atropos.exe
            binary: build/bin/atropos.exe
          - name: macOS
            os: macos-latest
            artifact: atropos-macos
            build-flags: ""
            binary: build/bin/atropos.app
          - name: Linux
            os: ubuntu-latest
            artifact: atropos-linux
            build-flags: -tags webkit2_41
            binary: build/bin/atropos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Compute version string
        shell: bash
        run: echo "APP_VERSION=$(git log -1 --format=%cd-%h --date=format:%Y%m%d --abbrev=6)" >> "$GITHUB_ENV"

      - name: Build application
        shell: bash
        run: wails build ${{ matrix.build-flags }} -ldflags "-X main.AppVersion=$APP_VERSION"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          retention-days: 14
